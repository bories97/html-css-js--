<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        var chkarr = document.getElementsByClassName("spo");

        }

        function allunchecked() {
            for (var i =0; i < array.length; i++) {
                chkarr[i].checked = null;
                
            }
        }

        function allreverse() {
             for (var i =0; i < array.length; i++) {
                if (chkarr[i].checked = true) {
                    chkarr[i].checked = false;
                } else {

                }

            }
        }

<body>

        <input type="checkbox" name="spo" value="야구"/>테니스
    </fieldset>
    <p>
        <button type="button" onclick="allchecked()">
            전체 선택하기
        </button>
        <button type="button" onclick="allunchecked()">
            전체 해제하기
        </button>
        <button type="button" onclick="allreverse()">
