<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J02Operator.html</title>
    <script>
        document.write("<h2>산술 연산자</h2>");
        document.write("3 % 5 * 2 + 10 / 5 = " + (3 % 5 * 2 + 10 / 5));
        
        document.write("<br />3 / 5 = " + (3 / 5));

        document.write("<h2>비교 연산자</h2>");
        document.write("가나다1">'가나다');

        document.write("<br />3 > 9 == 0 의 결과: " + (3 > 9 == 1));

        if (-1) {
            document.write("<br/>-1은 ture다");
        } else {
            document.write("<br/>-1은 false다");
        }

        if (null) {
            document.write("<br/>null은 ture다");
        } else {
            document.write("<br/>null은 false다");
        }

        if (false==null) {
            document.write("<br/>false는 ture다");
        } else {
            document.write("<br/>false는 false다");
        }

        if ("자바스크립터") {
            document.write("<br/>문자열은 ture다");
        } else {
            document.write("<br/>문자열은 false다");
        }


        document.write("<h2>논리 연산자</h2>");
        document.write("(3<2) || (5<=10) && !(3-4) 의 결과 =" + (3<2) || (5<=10) && !(3-4));


        document.write("<h2>증감 연산자</h2>");
        var num = 10;
        num++;
        document.write("num = " + ++num);
        document.write("<br/>num = " + num++);
        document.write("<br/>num = " + num);
        
        document.write("<h2>복합 대입 연산자<h2/>");
        document.write("num%=5=" + (num%=5));
    </script>
</head>
<body>
    
</body>
</html>
