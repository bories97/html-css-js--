<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>J05Switch.html</title>
        <script>
            switch (9%2==0) {
                case true:
                    document.write("9는 짝수입니다.<br/>");
                    break;
            
                default:
                    document.write("9는 홀수입니다.<br/>");
                    break;
            }
            
            switch ("자수") {
                case "자바":
                    document.write("자바를 선택하셨습니다.<br/>");
                    break;
            
                case "자스":
                    document.write("자스를 선택하셨습니다.<br/>");
                    break;
            
                case "자수":
                    document.write("자수를 선택하셨습니다.<br/>");
                    break;
            
                default:
                    break;
            }
        </script>
    </head>
    <body>
    
</body>
</html>
