<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>J15Event02.html</title>
        <script>
            window.onload = function () {
                alert("해당 문서의 load가 완료 되었습니다.");

                var i = document.getElementById("myinput").value;
                alert("i="+i);
            }
            // var myinput = document.getElementById("myinput");
            // alert("i="+i);
        </script>
    </head>
    <body>
        <h2>이벤트 - load 두번째</h2>
        <input type="text" id="myinput" value="이벤트 활용하기"/>
    </body>
</html>
