<!DOCTYPE html>
    <html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>J14Window04Interval.html</title>
        <script>
            function fn0ce() {
                alert("5초 후 딱 한번만 실행됩니다.");
                console.log("fn0ce() 호출됨");

            }
            function fncountine() {
                alert("3초마다 계속 실행됩니다.");
                console.log("fncountine() 호출됨");
            }

            var timeeronce, timermode;

            function fncallafter(flag) {
                if (flag=="T") {
                    timeeronce = window.setTimeout("fn0ce()", 5000);
                } else{
                    timermode = window.setInterval("fncountine()", 3000);
                }
            }

            function fncallback(flag) {
                if (flag==1){
                    clearTimeout(timeeronce);
                } else if (flag==2) {
                    clearInterval(timermode);
            }

            function displaytime() {
                var date = new Date();
                var displayclock = document.getElementById("clock");
                displayclock.innerHTML = date.getHours() + "시" + date.getMinutes() + "분" + date.getSeconds() + "초";
            }
            function displaytimecall() {
                setinterval("displaytime()", 1000);
            }
        }
        </script>
    </head>
    <body>
        <h2>setinterval(), settimeout() 함수</h2>

        <h3>일정 시간 후 함수 실행</h3>
        <input type = "button" value="5초 후 함수 실행" onclick="fncallafter('T');"/>
        <input type = "button" value="함수 호출 금지" onclick="fncallafter(1);"/>

        <h3>일정 시간마다 함수 실행</h3>
        <input type = "button" value="3초마다 함수 실행" onclick="fncallafter('I');"/>
        <input type = "button" value="함수 호출 금지" onclick="fncallback(2);"/>
        
        <h3>간단한 디지털 시계 구현하기</h3>
        <span id="clock" style="color: blue; font-size: 1.8em; font-weight: bold;"></span>
        <button type="button" onclick="displaytimecall()">디지털 시계</button>
    </body>
</html>
