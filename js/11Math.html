        <script>
            document.write("<h2>js의 core객체 - math</h2>");

            document.write("-10의 절댓값 : " + Math.abs(-10)+"<br/>");
            document.write("2의 3승 : " + Math.pow(2,3)+"<br/>");
            document.write("3.159 반올림 : " + Math.round(3.159)+"<br/>");
            document.write("3.159 올림 : " + Math.ceil(3.159)+"<br/>");
            document.write("3.159 내림 : " + Math.floor(3.159)+"<br/>");

            document.write("난수 발생 : " + Math.random()+"<br/>");
            document.write("난수 발생2 : " + parseInt(Math.random()*10 + 1)+"<br/>");
            document.write("최솟값 : " + Math.min(1,10,-100,-10,1000)+"<br/>");
            document.write("최댓값 : " + Math.max(1,10,-100,-10,1000)+"<br/>");
            </script>
