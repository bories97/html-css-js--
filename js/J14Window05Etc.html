<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>J14Window05Etc.html</title>
        <script>
            document.write("<h3>escape() / unescape() 함수</h3>");
            var escape1 = window.escape("안녕 hello 1234 !@#$%^&*()_+");
            document.write("encoding:" + escape1 +"<br/>");
            document.write("decoding:" + unescape("%uC548%uB155%20hello%201234%20%21@%23%24%25%5E%26*%28%29_+")+"<br/>");

            document.write("<h3>eval 함수</h3>");
            document.write("alert(나는 alert함수입니다.);<br/>");
            eval("alert('나는 alert함수입니다. eval()안에 있다');");
            document.write("<br/>1+2+3<br/>");
            document.write(eval("1+2+3")+"<br/>");
            //document.write(eval("일+2+3")+"<br/>");

            document.write("<h3>isNaN() 함수</h3>");
            isNaN("12A") ? document.write("숫자가 아닙니다.<br/>") : document.write("숫자입니다.<br/>");
            isNaN("12") ? document.write("숫자가 아닙니다.<br/>") : document.write("숫자입니다.<br/>");

            document.write("<h3>isFinite() 함수</h3>");
            document.write("12A를 숫자로 변환:" + parseInt("12A")+"<br/>");
            document.write("A12를 숫자로 변환:" + parseInt("A12")+"<br/>");
            document.write("32A12를 숫자로 변환:" + parseInt("32A12")+"<br/>");
        </script>
    </head>
    <body>
        
    </body>
</html>
