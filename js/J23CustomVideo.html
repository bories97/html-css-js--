<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>J23CustomVideo.html </title>
        <script>
            var video;
            window.onload = function () {
                var currentspan = document.getElementById("currenttime")
                var totalsapn = document.getElementById("totaltime")

                video = document.getElementById("video");

                video.volume = 0.5;

                video.addEventListener("timeupdate", function () {
                    currentspan.innerHTML = timeshow(video.currenttime)
                    totalsapn.innerHTML = timeshow(video.duration);

                    progress.max = video.duration;
                    progress.value = video.currenttime;
                })
            }

            function timeshow(seconds) {
                seconds = Math.round(seconds);
                var h = parseInt(seconds / 3600);
                var m = parseInt((seconds % 3600) / 60);
                var s = seconds % 60;

                 var hour = (h<10) ? '0'+h : h;
                 var min = (m<10) ? '0'+m : m;
                 var sec = (s<10) ? '0'+s : s;

                 return hour+":"+min+":"+sec;
            }

            function play() {
                video.hidden = "";
                video.play();
            }

            function stop() {
                video.hidden = true;
                video.pause();
            }

            function restart() {
                video.hidden = 0;
                video.play();
            }

            function setvolumn() {
                if (value==0) {
                    video.muted = true;
                } else {
                    video.muted = false;
                    var nowvolumn = video.volume;
                    if (value==1) {
                        nowvolumn += 0.1;
                        video.volume = (nowvolumn > 1) ? 1 : nowvolumn; 
                    } else {
                        nowvolumn -= 0.1;
                        video.volume = (nowvolumn < 0) ? 0 : nowvolumn;
                    }
                }
            }

            function setplayspeed(value) {
                if (value ==1) {
                    video.setplayspeed += 0.25;
                } else {
                    video.setplayspeed -= 0.25;
                }
            }

            function settime(value) {
                if (value ==1) {
                    video.currenttime += 10;
                } else {
                    video.currenttime -= 10;
                }
            }
        </script>
        <style>
            div {
                border: 1px solid red;
                width: 300px;
            }
            input {
                position: relative;	z-index: 2; height: 40px; line-height: 35px;
                background-color: #333;	border: 2px solid #333;
                color: #fff;
            }
            input:hover {
                background-color: #fff; border-color: #59b1eb; color: #59b1eb;
            }
            input::before, input::after {
                top: 0; width: 50%; height: 100%;
                background-color: #333;
            }
            input:hover::before, input:hover::after {
                width: 0; background-color: #59b1eb;
            }
        </style>

    </head>
    <body>
        <h2>자바 스크립트를 이용한 커스텀 비디오</h2>
        <div>
            <progress value="0" id="progress"></progress>
        </div>
        <div>
            <input type="button" value="PLAY" onclick="play()">
            <input type="button" value="STOP" onclick="stop()"><br/>
            <span id="current_time"></span>
            /
            <span id="total_time"></span>
        </div>
    </body>
</html>
