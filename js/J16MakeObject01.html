<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J16MakeObject01.html</title>
    <script>
        function inquiry() {
            return this.balance;
        }

        function thisposit(money) {
            this.balance += money;
        }

        function withdraw(money) {
             this.balance -= money;    
        }

        var account = new Object();
        account.ower = "홍길동";
        account.code = "111-1111-111";
        account.balance = 10000000;

        account.i = inquiry;
        account.d = thisposit;
        account.w = withdraw;
    </script>
</head>
<body>
    <h2>new object()로 사용 객체 만들기</h2>
    <script>
        document.write("account객체 => <br/>");
        document.write("소유자 :" + account.ower + "<br/>"); 
        document.write("계좌번호 :" + account.code + "<br/>"); 
        document.write("잔액 :" + account.balance + "<br/>"); 

        account.d(3000000);

        document.write("3000000원 입금 후 잔액 :" + account.i() + "<br/>");

        account.w(5000000);

        document.write("5000000원 출금 후 잔액 :" + account.i() + "<br/>");
    </script>
</body>
</html>
